<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Google</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <nav class="top-nav">
        <a href="#">About</a>
        <a href="#">Store</a>
        <div class="nav-right">
            <a href="#">Gmail</a>
            <a href="#">Images</a>
            <button class="apps-btn">Apps</button>
            <button class="sign-btn">Sign in</button>
        </div>
    </nav>

    <main>
        <img src="https://upload.wikimedia.org/wikipedia/commons/9/94/Google_logo_Transparent.png" alt="Google Logo" class="google-logo">
        <div class="search-box">
            <span class="search-icon">🔎</span>
            <input type="text" placeholder="Search Google or type a URL" aria-label="Search Google">
            <span class="mic-icon">🎤</span>
        </div>

        <div class="buttons">
            <button>Google Search</button>
            <button>I'm Feeling Lucky</button>
        </div>

        <p class="offer">Google offered in: <a href="#">Swahili</a></p>
    </main>

    <footer>
        <div class="footer-top">Kenya</div>
        <div class="footer-left">
            <a href="#">Advertising</a>
            <a href="#">Business</a>
            <a href="#">About</a>
            <a href="#">How Search works</a>
        </div>
        <div class="footer-right">
            <a href="#">Privacy</a>
            <a href="#">Terms</a>
            <a href="#">Settings</a>
        </div>
    </footer>
    
</body>
</html>
